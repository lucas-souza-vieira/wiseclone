<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Criar Conta — WiseClone</title>
  <meta name="description" content="Crie sua conta WiseClone e comece a enviar dinheiro internacionalmente com as melhores taxas." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-brand">
    <div class="brand-logo">
      <svg viewBox="0 0 48 48" fill="none">
        <circle cx="24" cy="24" r="24" fill="rgba(255,255,255,0.15)"/>
        <path d="M14 24C14 18.477 18.477 14 24 14s10 4.477 10 10-4.477 10-10 10S14 29.523 14 24z" fill="rgba(255,255,255,0.9)"/>
        <path d="M20 22l4-4 4 4M24 18v8" stroke="rgba(99,102,241,1)" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span>WiseClone</span>
    </div>
    <div class="brand-tagline">
      <h2>Junte-se a milhares de usuários</h2>
      <p>Crie sua conta em menos de 2 minutos e comece a usar seu banco global.</p>
    </div>
    <div class="brand-stats">
      <div class="brand-stat"><div class="value">R$ 1.000</div><div class="label">Bônus de boas-vindas</div></div>
      <div class="brand-stat"><div class="value">Grátis</div><div class="label">Cadastro</div></div>
    </div>
  </div>

  <div class="auth-form-panel">
    <div class="auth-form-container">
      <h1 class="auth-title">Criar conta gratuita</h1>
      <p class="auth-subtitle">Preencha seus dados para começar</p>

      <form id="register-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="full_name">Nome completo</label>
          <input id="full_name" name="full_name" type="text" class="form-input"
            placeholder="João Silva" required autocomplete="name" />
        </div>
        <div class="form-group">
          <label class="form-label" for="email">E-mail</label>
          <input id="email" name="email" type="email" class="form-input"
            placeholder="seu@email.com" required autocomplete="email" />
        </div>
        <div class="grid-2" style="gap:1rem">
          <div class="form-group">
            <label class="form-label" for="password">Senha</label>
            <input id="password" name="password" type="password" class="form-input"
              placeholder="Mínimo 8 caracteres" required />
          </div>
          <div class="form-group">
            <label class="form-label" for="confirm_password">Confirmar senha</label>
            <input id="confirm_password" name="confirm_password" type="password" class="form-input"
              placeholder="Repita a senha" required />
          </div>
        </div>
        <div class="grid-2" style="gap:1rem">
          <div class="form-group">
            <label class="form-label" for="phone">Telefone (opcional)</label>
            <input id="phone" name="phone" type="tel" class="form-input" placeholder="+55 48 99999-9999" />
          </div>
          <div class="form-group">
            <label class="form-label" for="country">País</label>
            <select id="country" name="country" class="form-select">
              <option value="BR">🇧🇷 Brasil</option>
              <option value="US">🇺🇸 EUA</option>
              <option value="DE">🇩🇪 Alemanha</option>
              <option value="GB">🇬🇧 Reino Unido</option>
              <option value="JP">🇯🇵 Japão</option>
              <option value="AR">🇦🇷 Argentina</option>
              <option value="CA">🇨🇦 Canadá</option>
              <option value="CH">🇨🇭 Suíça</option>
            </select>
          </div>
        </div>
        <div style="margin-bottom:1.5rem;margin-top:0.5rem">
          <button type="submit" id="submit-btn" class="btn btn-primary">🚀 Criar Conta Grátis</button>
        </div>
      </form>

      <div class="auth-link">
        Já tem uma conta? <a href="/login.html">Entrar</a>
      </div>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="/js/app.js"></script>
<script>initRegister();</script>
</body>
</html>
