name: 🛡️ DevSecOps Pipeline — WiseClone

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ════════════════════════════════════════════════════════
  # ETAPA 1 — Secret Detection (Gitleaks)
  # ════════════════════════════════════════════════════════
  secret-detection:
    name: 🔐 Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (histórico completo)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks — Varredura de Secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Upload relatório Gitleaks
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-report
          path: results.sarif
          if-no-files-found: ignore

  # ════════════════════════════════════════════════════════
  # ETAPA 2 — SCA: Software Composition Analysis (pip-audit)
  # ════════════════════════════════════════════════════════
  sca:
    name: 📦 SCA — Dependências
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar pip-audit
        run: pip install pip-audit

      - name: pip-audit — Varredura de CVEs
        run: |
          pip-audit \
            -r backend/requirements.txt \
            --format json \
            --output sca-report.json \
            --ignore-vuln GHSA-jfh8-c2jp-5kf4 || true

      - name: pip-audit — Saída legível
        run: pip-audit -r backend/requirements.txt || true

      - name: Upload relatório SCA
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sca-report
          path: sca-report.json

  # ════════════════════════════════════════════════════════
  # ETAPA 3 — SAST: Análise Estática (Semgrep + Bandit)
  # ════════════════════════════════════════════════════════
  sast:
    name: 🔍 SAST — Análise Estática
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar ferramentas SAST
        run: pip install bandit semgrep

      - name: Bandit — Análise de segurança Python
        run: |
          bandit -r backend/ \
            --format json \
            --output bandit-report.json \
            --severity-level medium \
            --confidence-level medium || true

      - name: Bandit — Saída legível
        run: bandit -r backend/ -ll || true

      - name: Semgrep — Regras de segurança
        run: |
          semgrep scan \
            --config p/python \
            --config p/security-audit \
            --config p/secrets \
            --json \
            --output semgrep-report.json \
            backend/ || true

      - name: Upload relatórios SAST
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-reports
          path: |
            bandit-report.json
            semgrep-report.json

  # ════════════════════════════════════════════════════════
  # ETAPA 4 — IaC Scanning (Checkov + Trivy)
  # ════════════════════════════════════════════════════════
  iac-scan:
    name: 🐳 IaC Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkov — Análise de IaC
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: dockerfile
          output_format: json
          output_file_path: checkov-report.json
          soft_fail: true

      - name: Trivy — Config scanning
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          format: json
          output: trivy-iac-report.json
          exit-code: "0"

      - name: Trivy — Saída legível
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          format: table
          exit-code: "0"

      - name: Upload relatórios IaC
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: iac-reports
          path: |
            checkov-report.json
            trivy-iac-report.json

  # ════════════════════════════════════════════════════════
  # ETAPA 5 — DAST: Análise Dinâmica (OWASP ZAP)
  # ════════════════════════════════════════════════════════
  dast:
    name: 🌐 DAST — OWASP ZAP
    runs-on: ubuntu-latest
    needs: [secret-detection, sca, sast, iac-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      - name: Build e subir aplicação
        run: |
          docker-compose up -d --build
          echo "Aguardando aplicação inicializar..."
          sleep 45

      - name: Verificar saúde da aplicação
        run: |
          timeout 90 bash -c \
            'until curl -sf http://localhost:8000/health; do echo "Aguardando..."; sleep 3; done'

      - name: OWASP ZAP — Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:8000"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a -j"
          allow_issue_writing: false
        continue-on-error: true

      - name: Upload relatório DAST
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dast-report
          path: |
            report_html.html
            report_json.json
            report_md.md

      - name: Parar containers
        if: always()
        run: docker-compose down -v
